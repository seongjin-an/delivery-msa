server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: restaurant-service

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/delivery}
    username: ${DATASOURCE_USERNAME:delivery}
    password: ${DATASOURCE_PASSWORD:delivery}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
